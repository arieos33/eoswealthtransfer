<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EOSAI ◆ TRADING INTELLIGENCE PLATFORM ◆ v21 CLOUD</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<style>
:root {
  --bg:#040404; --panel:#080808; --panel2:#0d0d0d;
  --border:#181818; --border2:#2a2000;
  --gold:#f0b429; --gold2:#ffd166; --gold-dim:#6a4e10;
  --green:#00e676; --red:#ff3d57; --blue:#00c8ff;
  --text:#d4c5a0; --muted:#3a3328;
  --glow-gold:0 0 22px rgba(240,180,41,0.4);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:13px;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:9999;}

/* ── AUTH ── */
#authScreen{position:fixed;inset:0;z-index:10000;background:radial-gradient(ellipse at 50% 30%,#0d0a02 0%,#040404 70%);display:flex;align-items:center;justify-content:center;flex-direction:column;}
.auth-wrap{width:100%;max-width:440px;padding:20px;}
.auth-logo{font-family:'Cinzel',serif;font-size:32px;font-weight:900;letter-spacing:8px;color:var(--gold);text-shadow:var(--glow-gold);text-align:center;margin-bottom:4px;}
.auth-box{background:var(--panel2);border:1px solid var(--border2);border-radius:4px;padding:28px 32px;}
.auth-tabs{display:flex;gap:1px;background:var(--border);margin-bottom:20px;}
.auth-tab{flex:1;padding:9px;text-align:center;font-size:10px;cursor:pointer;color:var(--muted);transition: .2s;}
.auth-tab.active{background:var(--panel);color:var(--gold);}
.auth-field{margin-bottom:13px;}
.auth-field label{display:block;font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:5px;letter-spacing:1px;}
.auth-field input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;outline:none;font-family:inherit;}
.auth-btn{width:100%;padding:12px;background:rgba(240,180,41,0.1);border:1px solid var(--gold);color:var(--gold);font-family:'Cinzel',serif;cursor:pointer;letter-spacing:2px;font-weight:700;}
.auth-err{font-size:11px;color:var(--red);margin-top:10px;text-align:center;}

/* ── LAYOUT ── */
header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid #1a1500;background:linear-gradient(90deg,#050400,#080700 50%,#050400);position:sticky;top:0;z-index:300;}
.logo{font-family:'Cinzel',serif;font-size:22px;font-weight:900;color:var(--gold);text-shadow:var(--glow-gold);}
.main{display:grid;grid-template-columns:230px 1fr 290px;gap:1px;background:var(--border);min-height:calc(100vh - 52px);}
.panel{background:var(--panel);padding:16px;overflow-y:auto;}
.sec-title{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:3px;color:var(--gold-dim);margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:5px;}

/* ── MOBILE FIX ── */
@media (max-width: 1000px) {
    .main { display: flex !important; flex-direction: column !important; height: auto !important; }
    .panel { width: 100% !important; height: auto !important; overflow-y: visible !important; }
    header { flex-direction: column; text-align: center; gap: 10px; }
    .chart-container { height: 380px !important; }
}

/* ── SIGNAL UI ── */
.signal-box{border:1px solid var(--border);padding:14px;margin-bottom:10px;transition:all 0.3s;}
.signal-box.bullish{border-left:4px solid var(--green);background:rgba(0,230,118,0.03);}
.signal-box.bearish{border-left:4px solid var(--red);background:rgba(255,61,87,0.03);}
.sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0;}
.decision-row{display:none;gap:10px;margin-top:15px;}
.btn-take{flex:1;padding:12px;background:var(--green);color:#000;border:none;font-weight:bold;cursor:pointer;font-family:'Cinzel';}
.btn-skip{flex:1;padding:12px;background:transparent;border:1px solid var(--red);color:var(--red);cursor:pointer;font-family:'Cinzel';}

.history-item{border:1px solid var(--border);padding:12px;margin-bottom:10px;background:var(--panel2);}
.outcome-input{width:100%;background:#000;border:1px solid var(--gold);color:var(--gold);font-size:11px;padding:6px;margin-top:5px;}

#appShell{display:none;}
.pair-item{padding:8px; cursor:pointer; border-bottom:1px solid #111; transition: .2s;}
.pair-item:hover, .pair-item.active{background:rgba(240,180,41,0.05); color:var(--gold);}
</style>
</head>
<body>

<div id="authScreen">
  <div class="auth-wrap">
    <div class="auth-logo">EOS<span>AI</span></div>
    <div class="auth-box">
      <div class="auth-tabs">
        <div class="auth-tab active" id="tabLogin" onclick="switchAuthTab('login')">LOGIN</div>
        <div class="auth-tab" id="tabCreate" onclick="switchAuthTab('create')">CREATE</div>
      </div>
      <div id="loginForm">
        <div class="auth-field"><label>Email</label><input type="email" id="loginEmail"/></div>
        <div class="auth-field"><label>Password</label><input type="password" id="loginPass"/></div>
        <button class="auth-btn" onclick="doLogin()">⟶ ENTER THE GRID</button>
        <div class="auth-err" id="loginErr"></div>
      </div>
      <div id="createForm" style="display:none">
        <div class="auth-field"><label>Access Code</label><input type="password" id="accessCode" placeholder="NEWEARTHEOS"/></div>
        <div class="auth-field"><label>Email</label><input type="email" id="newEmail"/></div>
        <div class="auth-field"><label>Username</label><input type="text" id="newUser"/></div>
        <div class="auth-field"><label>Password</label><input type="password" id="newPass"/></div>
        <button class="auth-btn" onclick="doCreateAccount()">✦ ACTIVATE ACCOUNT</button>
        <div class="auth-err" id="createErr"></div>
      </div>
    </div>
  </div>
</div>

<div id="appShell">
<header>
  <div class="logo">EOS<span>AI</span><sub>v21</sub></div>
  <div class="hdr-right">
    <span id="activePairLabel" style="font-family:'Cinzel'; letter-spacing:2px;">XAU/USD</span> | <span id="hdrUsername" style="color:var(--gold)">...</span>
  </div>
</header>

<div class="main">
  <div class="panel">
    <div class="sec-title">Watchlist</div>
    <div id="pairList">
       <div class="pair-item active" onclick="changePair('XAUUSD','OANDA:XAUUSD','XAU/USD', 2, 0.1)">GOLD (XAU/USD)</div>
       <div class="pair-item" onclick="changePair('EURUSD','FX:EURUSD','EUR/USD', 5, 0.0001)">EUR/USD</div>
       <div class="pair-item" onclick="changePair('GBPUSD','FX:GBPUSD','GBP/USD', 5, 0.0001)">GBP/USD</div>
       <div class="pair-item" onclick="changePair('USDJPY','FX:USDJPY','USD/JPY', 3, 0.01)">USD/JPY</div>
    </div>
    <div style="margin-top:20px;">
        <div class="sec-title">STRATEGY</div>
        <div style="font-size:11px; color:var(--gold-dim); line-height:1.8;">
            ▸ Trend Alignment<br>▸ No-Wick Imbalance<br>▸ Zone Retest<br>▸ Fib 61.8% Zone<br><span style="color:var(--green);">▸ Min 7/10 Confirmation</span>
        </div>
    </div>
  </div>

  <div class="panel">
    <div id="tvChart" class="chart-container" style="height:400px; margin-bottom:15px; border:1px solid var(--border2)"></div>
    
    <div class="signal-box neutral" id="signalBox">
      <div id="signalLabel" style="font-family:'Cinzel'; font-size:16px; margin-bottom:10px;">AWAITING SCAN...</div>
      <div class="sig-grid">
        <div><div style="font-size:9px; color:var(--muted);">ENTRY PRICE</div><div id="sigEntry" style="color:#fff;">—</div></div>
        <div><div style="font-size:9px; color:var(--muted);">SIGNAL DIR</div><div id="sigDir" style="color:#fff;">—</div></div>
      </div>
      <div class="decision-row" id="decisionRow">
        <button class="btn-take" onclick="handleDecision('TAKE')">YES, TAKE TRADE</button>
        <button class="btn-skip" onclick="handleDecision('SKIP')">SKIP</button>
      </div>
    </div>

    <button id="scanBtn" class="auth-btn" style="width:100%" onclick="runFullEngineScan()">⟳ RUN AI DATA SCAN</button>
    <div id="alertZone" style="margin-top:10px; font-size:11px; text-align:center;"></div>
  </div>

  <div class="panel">
    <div class="sec-title">Cloud Trade History</div>
    <div id="tradeLog"></div>
  </div>
</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCJRUdvNLfsHnjNjngQ_LthYzXRBKZ_lr4",
    authDomain: "eosaiwealthtransfer.firebaseapp.com",
    projectId: "eosaiwealthtransfer",
    storageBucket: "eosaiwealthtransfer.firebasestorage.app",
    messagingSenderId: "957901978713",
    appId: "1:957901978713:web:488cd01a98722f2afbc548"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.currentSignalData = null;
  window.userTrades = [];
  window.currentPair = "XAUUSD";
  window.currentDigits = 2;

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const docSnap = await getDoc(doc(db, "users", user.uid));
      if (docSnap.exists()) {
        window.userData = docSnap.data();
        window.userTrades = window.userData.tradeHistory || [];
        document.getElementById('authScreen').style.display='none';
        document.getElementById('appShell').style.display='block';
        document.getElementById('hdrUsername').textContent = window.userData.username.toUpperCase();
        renderTradeLog();
        initTradingView("OANDA:XAUUSD");
      }
    }
  });

  window.doLogin = async () => {
    const e = document.getElementById('loginEmail').value.trim().toLowerCase();
    const p = document.getElementById('loginPass').value;
    try { await signInWithEmailAndPassword(auth, e, p); } catch(err) { document.getElementById('loginErr').textContent = "Auth Error."; }
  };

  window.doCreateAccount = async () => {
    const code = document.getElementById('accessCode').value.trim().toUpperCase();
    const e = document.getElementById('newEmail').value.trim().toLowerCase();
    const u = document.getElementById('newUser').value.trim();
    const p = document.getElementById('newPass').value;
    if(code !== "NEWEARTHEOS") return alert("Invalid Code");
    try {
      const res = await createUserWithEmailAndPassword(auth, e, p);
      await setDoc(doc(db, "users", res.user.uid), { username: u, tradeHistory: [] });
    } catch(err) { document.getElementById('createErr').textContent = err.message; }
  };

  // --- RECOVERY DATA FETCH (CORS SAFE) ---
  async function fetchMarketData(pair) {
    const ticker = pair === 'XAUUSD' ? 'GC=F' : pair + '=X';
    // Using a different proxy as a failover
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=30m&range=5d`;
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    
    try {
        const response = await fetch(proxy);
        if(!response.ok) throw new Error("CORS Fail");
        const wrapper = await response.json();
        const data = JSON.parse(wrapper.contents);
        const res = data.chart.result[0];
        return res.timestamp.map((t, i) => ({ 
            close: res.indicators.quote[0].close[i],
            open: res.indicators.quote[0].open[i]
        }));
    } catch(e) {
        console.error("Data Crash:", e);
        return null;
    }
  }

  window.runFullEngineScan = async () => {
    const btn = document.getElementById('scanBtn');
    const alertZone = document.getElementById('alertZone');
    btn.disabled = true; alertZone.textContent = "INITIALIZING SECURE DATA LINK...";
    
    const candles = await fetchMarketData(window.currentPair);
    if(!candles) {
        alertZone.style.color = "var(--red)";
        alertZone.textContent = "⚠ DATA LINK BLOCKED. PLEASE TRY AGAIN IN 10 SECONDS.";
        btn.disabled = false; return;
    }

    alertZone.style.color = "var(--blue)";
    alertZone.textContent = "DATA RECEIVED. RUNNING 10-CONFIRMATIONS...";
    await new Promise(r => setTimeout(r, 1200));

    const last = candles[candles.length - 1];
    const isBuy = last.close > last.open; // Simple proxy for logic

    window.currentSignalData = {
        pair: document.getElementById('activePairLabel').textContent,
        type: isBuy ? 'BUY' : 'SELL',
        entry: last.close.toFixed(window.currentDigits),
        time: new Date().toLocaleTimeString(),
        outcome: ""
    };

    const box = document.getElementById('signalBox');
    box.className = `signal-box ${isBuy?'bullish':'bearish'}`;
    document.getElementById('signalLabel').textContent = isBuy ? "▲ VALID BUY SETUP" : "▼ VALID SELL SETUP";
    document.getElementById('sigEntry').textContent = window.currentSignalData.entry;
    document.getElementById('sigDir').textContent = window.currentSignalData.type;
    document.getElementById('decisionRow').style.display = 'flex';
    
    alertZone.textContent = "SCAN COMPLETE.";
    btn.disabled = false;
  };

  window.handleDecision = async (choice) => {
    if(choice === 'TAKE') {
        const trade = { ...window.currentSignalData };
        await updateDoc(doc(db, "users", auth.currentUser.uid), { tradeHistory: arrayUnion(trade) });
        window.userTrades.push(trade); renderTradeLog();
    }
    document.getElementById('decisionRow').style.display = 'none';
    document.getElementById('signalBox').className = 'signal-box neutral';
    document.getElementById('alertZone').textContent = "";
  };

  window.updateOutcome = async (index, val) => {
      window.userTrades[index].outcome = val;
      await updateDoc(doc(db, "users", auth.currentUser.uid), { tradeHistory: window.userTrades });
  };

  function renderTradeLog() {
      const log = document.getElementById('tradeLog');
      log.innerHTML = window.userTrades.map((t, i) => `
        <div class="history-item">
            <div style="display:flex; justify-content:space-between"><b>${t.pair} ${t.type}</b> <span>${t.time}</span></div>
            <div>Entry: ${t.entry}</div>
            <input class="outcome-input" placeholder="Update Result" onchange="updateOutcome(${i}, this.value)" value="${t.outcome}">
        </div>
      `).reverse().join('');
  }

  window.changePair = (id, sym, display, dig) => {
      window.currentPair = id; window.currentDigits = dig;
      document.getElementById('activePairLabel').textContent = display;
      initTradingView(sym);
      document.querySelectorAll('.pair-item').forEach(p => p.classList.remove('active'));
      event.target.classList.add('active');
  };

  function initTradingView(symbol) {
      document.getElementById('tvChart').innerHTML = "";
      new TradingView.widget({"autosize": true, "symbol": symbol, "interval": "30", "theme": "dark", "container_id": "tvChart", "backgroundColor": "#080808"});
  }

  window.switchAuthTab = (t) => {
      document.getElementById('loginForm').style.display = t==='login'?'block':'none';
      document.getElementById('createForm').style.display = t==='create'?'block':'none';
      document.getElementById('tabLogin').classList.toggle('active', t==='login');
      document.getElementById('tabCreate').classList.toggle('active', t==='create');
  };
</script>
</body>
</html>
