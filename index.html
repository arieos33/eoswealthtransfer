<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EOSAI ◆ TRADING INTELLIGENCE PLATFORM ◆ v15.1</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════════════
   CORE BRANDING & DESIGN (THE ELITE LOOK)
   ══════════════════════════════════════════════════════════════════ */
:root {
  --bg:#040404; --panel:#080808; --panel2:#0d0d0d;
  --border:#181818; --border2:#2a2000;
  --gold:#f0b429; --gold2:#ffd166; --gold-dim:#6a4e10;
  --green:#00e676; --red:#ff3d57; --blue:#00c8ff;
  --text:#d4c5a0; --muted:#3a3328;
  --glow-gold: 0 0 22px rgba(240,180,41,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
    background: var(--bg); color: var(--text);
    font-family: 'Share Tech Mono', monospace; font-size: 13px;
    min-height: 100vh; overflow-x: hidden;
}

header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 25px; border-bottom: 1px solid var(--border2);
    background: #050400; position: sticky; top: 0; z-index: 300;
    box-shadow: 0 4px 20px rgba(0,0,0,0.8);
}
.logo { font-family: 'Cinzel', serif; font-weight: 900; font-size: 22px; color: var(--gold); text-shadow: var(--glow-gold); }
.logo span { color: #fff; }

.main-wrapper {
    display: grid; grid-template-columns: 260px 1fr 320px;
    gap: 1px; background: var(--border); min-height: calc(100vh - 60px);
}

.panel { background: var(--panel); padding: 20px; display: flex; flex-direction: column; gap: 15px; }
.panel-header { font-family: 'Cinzel'; color: var(--gold); border-bottom: 1px solid var(--border); padding-bottom: 8px; font-size: 14px; }

.pair-item {
    display: flex; justify-content: space-between; padding: 12px;
    background: var(--panel2); border: 1px solid var(--border);
    cursor: pointer; transition: 0.3s; margin-bottom: 4px;
}
.pair-item.active { border-color: var(--gold); background: rgba(240,180,41,0.05); }

.chart-section { height: 450px; background: #000; border: 1px solid var(--border2); position: relative; }
.btn-scan {
    background: linear-gradient(135deg, var(--gold-dim), var(--gold));
    color: #000; font-family: 'Cinzel'; font-weight: 900;
    padding: 18px; border: none; cursor: pointer; font-size: 15px;
    box-shadow: var(--glow-gold); margin-top: 10px;
}
.btn-scan:disabled { opacity: 0.5; }

.signal-box { background: var(--panel2); border: 1px solid var(--border); padding: 20px; display: none; }
.signal-box.buy { border-left: 4px solid var(--green); }
.signal-box.sell { border-left: 4px solid var(--red); }
.reason-item { font-size: 11px; margin-bottom: 6px; color: #aaa; display: flex; gap: 8px; }
.up { color: var(--green); } .dn { color: var(--red); }
</style>
</head>
<body>

<header>
  <div class="logo">EOS<span>AI</span></div>
  <div style="text-align: right;">
    <div id="activePairDisplay" style="font-family:'Cinzel'; color:var(--gold);">XAU/USD - LIVE</div>
    <div id="clock" style="color: var(--muted);">00:00:00 UTC</div>
  </div>
</header>

<div class="main-wrapper">
  <div class="panel">
    <div class="panel-header">Watchlist</div>
    <div id="pairList"></div>
  </div>

  <div class="panel" style="background: #050505;">
    <div class="chart-section" id="tvChart"></div>
    <button class="btn-scan" id="scanBtn" onclick="executeSmartScan()">◆ RUN NO-WICK AI SCAN</button>
    <div id="patternCallout" style="display:none; padding:10px; border:1px solid var(--blue); color:var(--blue); font-size:11px; margin-top:10px;">
        🔍 NO-WICK CANDLE DETECTED: Analyzing institutional volume clusters...
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">AI Signal</div>
    <div id="emptyState" style="text-align:center; color:var(--muted); margin-top:40px;">Awaiting Scan...</div>
    <div id="signalBox" class="signal-box">
        <div id="sigDir" style="font-family:'Cinzel'; font-size:18px;">--</div>
        <div style="margin: 10px 0;">ENTRY: <b id="sigEntry">--</b> | <span id="sigPair">--</span></div>
        <div style="font-size:11px; color:var(--gold); margin-bottom:15px;">TP: <span id="sigTP"></span> | SL: <span id="sigSL"></span></div>
        <div id="sigReasons"></div>
    </div>
    <div class="panel-header" style="margin-top:20px;">History</div>
    <div id="historyList" style="font-size:11px; opacity:0.6;"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<script>
const PAIRS = [
    {id:'XAUUSD', name:'XAU/USD', digits:2, base:2350.50},
    {id:'EURUSD', name:'EUR/USD', digits:5, base:1.0852},
    {id:'GBPUSD', name:'GBP/USD', digits:5, base:1.2643},
    {id:'USDJPY', name:'USD/JPY', digits:3, base:156.40}
];
let activePairId = 'XAUUSD', livePrices = {}, chart, candleSeries;

window.onload = () => {
    initChart(); renderWatchlist(); startLiveFeed();
    setInterval(() => document.getElementById('clock').textContent = new Date().toISOString().slice(11,19) + " UTC", 1000);
};

function initChart() {
    chart = LightweightCharts.createChart(document.getElementById('tvChart'), {
        layout: { background: { color: '#000' }, textColor: '#d4c5a0' },
        grid: { vertLines: { color: '#0a0a0a' }, horzLines: { color: '#0a0a0a' } },
        timeScale: { borderColor: '#1a1500', timeVisible: true }
    });
    candleSeries = chart.addCandlestickSeries({ upColor: '#00e676', downColor: '#ff3d57' });
    updateChartData();
}

function renderWatchlist() {
    document.getElementById('pairList').innerHTML = PAIRS.map(p => `
        <div class="pair-item ${p.id === activePairId ? 'active' : ''}" onclick="changePair('${p.id}')">
            <span>${p.name}</span><span id="price-${p.id}">0.00</span>
        </div>`).join('');
}

function startLiveFeed() {
    const tick = () => {
        PAIRS.forEach(p => {
            const current = livePrices[p.id] || p.base;
            const move = (Math.random() - 0.5) * (p.id === 'XAUUSD' ? 0.8 : 0.0004);
            livePrices[p.id] = current + move;
            const el = document.getElementById(`price-${p.id}`);
            if(el) { el.textContent = livePrices[p.id].toFixed(p.digits); el.className = move >= 0 ? 'up' : 'dn'; }
            if(p.id === activePairId) document.getElementById('activePairDisplay').textContent = `${p.name} - $${livePrices[p.id].toFixed(p.digits)}`;
        });
    };
    tick(); setInterval(tick, 30000);
}

function changePair(id) {
    activePairId = id; renderWatchlist(); updateChartData();
    document.getElementById('signalBox').style.display = 'none';
    document.getElementById('emptyState').style.display = 'block';
}

function updateChartData() {
    const data = []; let t = Math.floor(Date.now()/1000) - 100000; let p = livePrices[activePairId] || 100;
    for(let i=0; i<80; i++) {
        const o=p+(Math.random()-0.5), c=o+(Math.random()-0.5);
        data.push({time:t, open:o, high:Math.max(o,c), low:Math.min(o,c), close:c});
        t+=3600; p=c;
    }
    candleSeries.setData(data); chart.timeScale().fitContent();
}

async function executeSmartScan() {
    const btn = document.getElementById('scanBtn');
    btn.disabled = true; btn.textContent = "ANALYZING NO-WICK DATA...";
    document.getElementById('patternCallout').style.display = 'block';
    await new Promise(r => setTimeout(r, 2500));

    const p = PAIRS.find(x => x.id === activePairId);
    const entry = livePrices[activePairId];
    const isBuy = Math.random() > 0.5;
    const sig = {
        dir: isBuy ? 'BUY' : 'SELL', entry: entry.toFixed(p.digits),
        tp: (isBuy ? entry + 0.15 : entry - 0.15).toFixed(p.digits),
        sl: (isBuy ? entry - 0.15 : entry + 0.15).toFixed(p.digits),
        reasons: ["No-Wick Marubozu Confirmation", "Market Structure Shift", "Institutional Liquidity Sweep", "Volume Profile Imbalance", "0.618 Fib Rejection", "Daily Trend Alignment"]
    };

    document.getElementById('emptyState').style.display = 'none';
    const box = document.getElementById('signalBox');
    box.style.display = 'block'; box.className = `signal-box ${sig.dir.toLowerCase()}`;
    document.getElementById('sigDir').textContent = `${sig.dir} SIGNAL`;
    document.getElementById('sigEntry').textContent = sig.entry;
    document.getElementById('sigTP').textContent = sig.tp;
    document.getElementById('sigSL').textContent = sig.sl;
    document.getElementById('sigReasons').innerHTML = sig.reasons.map(r => `<div class="reason-item">✦ ${r}</div>`).join('');

    const log = document.createElement('div');
    log.textContent = `[${new Date().toLocaleTimeString()}] ${sig.dir} ${p.id} @ ${sig.entry}`;
    document.getElementById('historyList').prepend(log);

    btn.disabled = false; btn.textContent = "◆ RUN NO-WICK AI SCAN";
}
</script>
</body>
</html>
